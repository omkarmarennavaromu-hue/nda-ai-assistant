<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NDA AI Assistant</title>

<style>

body{
margin:0;
font-family:Arial;
background:#343541;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:260px;
background:#202123;
padding:15px;
display:flex;
flex-direction:column;
}

.sidebar h2{
font-size:18px;
margin-bottom:20px;
}

.newchat{
background:#444654;
padding:10px;
border-radius:6px;
cursor:pointer;
text-align:center;
}

.chat-container{
flex:1;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
max-width:70%;
padding:12px;
margin:10px 0;
border-radius:10px;
line-height:1.5;
}

.user{
background:#2563eb;
margin-left:auto;
}

.bot{
background:#444654;
}

.input-area{
display:flex;
padding:15px;
background:#40414f;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:5px;
font-size:16px;
}

button{
margin-left:10px;
padding:12px 20px;
border:none;
background:#10a37f;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>NDA AI</h2>
<div class="newchat" onclick="newChat()">+ New Chat</div>
</div>

<div class="chat-container">

<div id="chat" class="chat"></div>

<div class="input-area">
<input id="input" placeholder="Ask anything about NDA exam...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

const API_KEY="PASTE_YOUR_OPENROUTER_KEY_HERE"

const systemPrompt=`
You are an NDA exam preparation assistant.

Subjects:
Mathematics
Physics
Chemistry
English
General Knowledge

You can:
Explain concepts
Generate MCQs
Solve maths problems
Provide NDA syllabus help

You understand English, Hindi, and Kannada.
`;

let messages=[{role:"system",content:systemPrompt}]

function addMessage(text,cls){

let div=document.createElement("div")
div.className="message "+cls
div.innerText=text

document.getElementById("chat").appendChild(div)
document.getElementById("chat").scrollTop=999999

}

function newChat(){
document.getElementById("chat").innerHTML=""
messages=[{role:"system",content:systemPrompt}]
}

async function send(){

let input=document.getElementById("input")
let text=input.value

if(!text)return

addMessage(text,"user")
messages.push({role:"user",content:text})

input.value=""

addMessage("Thinking...","bot")

const response=await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({
model:"openai/gpt-3.5-turbo",
messages:messages
})

})

const data=await response.json()

document.querySelectorAll(".bot").forEach(e=>{
if(e.innerText=="Thinking...") e.remove()
})

let reply=data.choices[0].message.content

addMessage(reply,"bot")

messages.push({role:"assistant",content:reply})

}

</script>

</body>
  </html>
